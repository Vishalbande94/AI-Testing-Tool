<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forgot Password — InsureAI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-wrapper">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="auth-card bg-white mx-auto">
          <div class="text-center mb-4">
            <div class="auth-logo">Insure<span>AI</span></div>
            <h4 class="fw-bold mt-1">Reset Password</h4>
            <p class="text-muted small">Enter your registered email to receive a reset link</p>
          </div>
          <div id="formView">
            <form id="forgotForm" novalidate>
              <div class="mb-4">
                <label class="form-label">Email Address <span class="text-danger">*</span></label>
                <input type="email" id="email" class="form-control" placeholder="Enter your registered email" required>
                <div class="invalid-feedback">Enter a valid email address.</div>
              </div>
              <button type="submit" class="btn btn-primary w-100 py-2">Send Reset Link</button>
            </form>
          </div>
          <div id="successView" class="d-none text-center">
            <div style="font-size:3rem">📧</div>
            <h5 class="fw-bold mt-2">Reset Link Sent!</h5>
            <p class="text-muted small">If this email is registered, a password reset link has been sent. The link expires in 24 hours.</p>
            <a href="login.html" class="btn btn-primary w-100 mt-2">Back to Login</a>
          </div>
          <p class="text-center mt-3 text-muted small">
            Remember your password? <a href="login.html" class="text-primary fw-bold">Sign In</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script>
  App.seed();
  document.getElementById('forgotForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      document.getElementById('email').classList.add('is-invalid');
      return;
    }
    document.getElementById('formView').classList.add('d-none');
    document.getElementById('successView').classList.remove('d-none');
  });
</script>
</body>
</html>
