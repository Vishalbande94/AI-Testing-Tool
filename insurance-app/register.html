<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register — InsureAI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-wrapper">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="auth-card bg-white mx-auto">
          <div class="text-center mb-4">
            <div class="auth-logo">Insure<span>AI</span></div>
            <h4 class="fw-bold mt-1">Create Your Account</h4>
            <p class="text-muted small">Join thousands of customers who trust InsureAI</p>
          </div>

          <form id="registerForm" novalidate>
            <div class="mb-3">
              <label class="form-label">Full Name <span class="text-danger">*</span></label>
              <input type="text" id="name" class="form-control" placeholder="Rahul Sharma" required>
              <div class="invalid-feedback" id="nameErr"></div>
            </div>
            <div class="mb-3">
              <label class="form-label">Email Address <span class="text-danger">*</span></label>
              <input type="email" id="email" class="form-control" placeholder="rahul@example.com" required>
              <div class="invalid-feedback" id="emailErr"></div>
            </div>
            <div class="mb-3">
              <label class="form-label">Mobile Number <span class="text-danger">*</span></label>
              <input type="tel" id="mobile" class="form-control" placeholder="10-digit mobile number" maxlength="10" required>
              <div class="invalid-feedback" id="mobileErr"></div>
            </div>
            <div class="mb-3">
              <label class="form-label">Date of Birth <span class="text-danger">*</span></label>
              <input type="date" id="dob" class="form-control" required>
              <div class="invalid-feedback" id="dobErr"></div>
            </div>
            <div class="mb-3">
              <label class="form-label">Password <span class="text-danger">*</span></label>
              <div class="input-group">
                <input type="password" id="password" class="form-control" placeholder="Min 8 chars, upper+lower+number+special" required>
                <button class="btn btn-outline-secondary" type="button" onclick="togglePwd('password','eyeIcon1')"><i class="bi bi-eye" id="eyeIcon1"></i></button>
              </div>
              <div class="invalid-feedback d-block" id="passwordErr"></div>
            </div>
            <div class="mb-4">
              <label class="form-label">Confirm Password <span class="text-danger">*</span></label>
              <div class="input-group">
                <input type="password" id="confirmPassword" class="form-control" placeholder="Re-enter password" required>
                <button class="btn btn-outline-secondary" type="button" onclick="togglePwd('confirmPassword','eyeIcon2')"><i class="bi bi-eye" id="eyeIcon2"></i></button>
              </div>
              <div class="invalid-feedback d-block" id="confirmErr"></div>
            </div>

            <div id="alertBox" class="alert d-none mb-3" role="alert"></div>

            <button type="submit" class="btn btn-primary w-100 py-2" id="submitBtn">
              <span id="btnText">Create Account</span>
              <span id="btnLoader" class="d-none spinner-border spinner-border-sm ms-2"></span>
            </button>
          </form>

          <p class="text-center mt-3 text-muted small">
            Already have an account? <a href="login.html" class="text-primary fw-bold">Sign In</a>
          </p>
          <p class="text-center mt-2 text-muted small">
            <a href="index.html">← Back to Home</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script>
  App.seed();
  App.redirectIfLoggedIn();

  function togglePwd(id, iconId) {
    const el = document.getElementById(id);
    const icon = document.getElementById(iconId);
    if (el.type === 'password') { el.type = 'text'; icon.className = 'bi bi-eye-slash'; }
    else { el.type = 'password'; icon.className = 'bi bi-eye'; }
  }

  function clearErrors() {
    ['name','email','mobile','dob','password','confirm'].forEach(f => {
      const el = document.getElementById(f === 'confirm' ? 'confirmPassword' : f);
      const err = document.getElementById(f + (f === 'confirm' ? 'Err' : 'Err'));
      if (el) el.classList.remove('is-invalid');
    });
  }

  function setError(fieldId, errId, msg) {
    document.getElementById(fieldId).classList.add('is-invalid');
    document.getElementById(errId).textContent = msg;
  }

  function validatePassword(pwd) {
    if (pwd.length < 8) return 'Password must be at least 8 characters.';
    if (!/[A-Z]/.test(pwd)) return 'Must include at least one uppercase letter.';
    if (!/[a-z]/.test(pwd)) return 'Must include at least one lowercase letter.';
    if (!/[0-9]/.test(pwd)) return 'Must include at least one number.';
    if (!/[^A-Za-z0-9]/.test(pwd)) return 'Must include at least one special character.';
    return null;
  }

  function calculateAge(dob) {
    const today = new Date();
    const birth = new Date(dob);
    let age = today.getFullYear() - birth.getFullYear();
    const m = today.getMonth() - birth.getMonth();
    if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) age--;
    return age;
  }

  document.getElementById('registerForm').addEventListener('submit', function(e) {
    e.preventDefault();
    clearErrors();

    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const mobile = document.getElementById('mobile').value.trim();
    const dob = document.getElementById('dob').value;
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirmPassword').value;

    let valid = true;

    if (!name) { setError('name','nameErr','Full name is required.'); valid = false; }
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { setError('email','emailErr','Enter a valid email address.'); valid = false; }
    if (!mobile || !/^\d{10}$/.test(mobile)) { setError('mobile','mobileErr','Enter a valid 10-digit mobile number.'); valid = false; }
    if (!dob) { setError('dob','dobErr','Date of birth is required.'); valid = false; }
    else if (calculateAge(dob) < 18) { setError('dob','dobErr','You must be at least 18 years old to register.'); valid = false; }

    const pwdErr = validatePassword(password);
    if (pwdErr) { setError('password','passwordErr',pwdErr); valid = false; }
    if (password !== confirm) { setError('confirmPassword','confirmErr','Passwords do not match.'); valid = false; }

    if (!valid) return;

    document.getElementById('btnText').textContent = 'Creating...';
    document.getElementById('btnLoader').classList.remove('d-none');
    document.getElementById('submitBtn').disabled = true;

    setTimeout(() => {
      const result = App.register({ name, email, mobile, dob, password });
      if (result.ok) {
        const box = document.getElementById('alertBox');
        box.className = 'alert alert-success mb-3';
        box.textContent = '✅ Account created successfully! Redirecting to login...';
        box.classList.remove('d-none');
        setTimeout(() => window.location.href = 'login.html', 1800);
      } else {
        const box = document.getElementById('alertBox');
        box.className = 'alert alert-danger mb-3';
        box.textContent = result.msg;
        box.classList.remove('d-none');
        document.getElementById('btnText').textContent = 'Create Account';
        document.getElementById('btnLoader').classList.add('d-none');
        document.getElementById('submitBtn').disabled = false;
      }
    }, 800);
  });
</script>
</body>
</html>
