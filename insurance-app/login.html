<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — InsureAI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-wrapper">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="auth-card bg-white mx-auto">
          <div class="text-center mb-4">
            <div class="auth-logo">Insure<span>AI</span></div>
            <h4 class="fw-bold mt-1">Welcome Back</h4>
            <p class="text-muted small">Sign in to manage your policies</p>
          </div>

          <!-- DEMO CREDENTIALS BOX -->
          <div class="alert alert-info py-2 px-3 mb-3 small">
            <strong>Demo Credentials:</strong><br>
            Customer: <code>rahul@demo.com</code> / <code>Test@1234</code><br>
            Admin: <code>admin@insureai.com</code> / <code>Admin@123</code>
          </div>

          <form id="loginForm" novalidate>
            <div class="mb-3">
              <label class="form-label">Email Address <span class="text-danger">*</span></label>
              <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
              <div class="invalid-feedback" id="emailErr">Enter a valid email address.</div>
            </div>
            <div class="mb-3">
              <label class="form-label">
                Password <span class="text-danger">*</span>
                <a href="forgot-password.html" class="float-end text-primary small fw-normal">Forgot Password?</a>
              </label>
              <div class="input-group">
                <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
                <button class="btn btn-outline-secondary" type="button" onclick="togglePwd()"><i class="bi bi-eye" id="eyeIcon"></i></button>
              </div>
              <div class="invalid-feedback d-block" id="passwordErr"></div>
            </div>
            <div class="mb-4 form-check">
              <input class="form-check-input" type="checkbox" id="rememberMe">
              <label class="form-check-label small" for="rememberMe">Remember me for 7 days</label>
            </div>

            <div id="alertBox" class="alert d-none mb-3" role="alert"></div>

            <button type="submit" class="btn btn-primary w-100 py-2" id="submitBtn">
              <span id="btnText">Sign In</span>
              <span id="btnLoader" class="d-none spinner-border spinner-border-sm ms-2"></span>
            </button>
          </form>

          <p class="text-center mt-3 text-muted small">
            New to InsureAI? <a href="register.html" class="text-primary fw-bold">Create Account</a>
          </p>
          <p class="text-center mt-2 text-muted small">
            <a href="index.html">← Back to Home</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script>
  App.seed();
  App.redirectIfLoggedIn();

  function togglePwd() {
    const el = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    el.type = el.type === 'password' ? 'text' : 'password';
    icon.className = el.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
  }

  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    let valid = true;

    document.getElementById('email').classList.remove('is-invalid');
    document.getElementById('password').classList.remove('is-invalid');

    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      document.getElementById('email').classList.add('is-invalid');
      document.getElementById('emailErr').textContent = 'Enter a valid email address.';
      valid = false;
    }
    if (!password) {
      document.getElementById('password').classList.add('is-invalid');
      document.getElementById('passwordErr').textContent = 'Password is required.';
      valid = false;
    }
    if (!valid) return;

    document.getElementById('btnText').textContent = 'Signing in...';
    document.getElementById('btnLoader').classList.remove('d-none');
    document.getElementById('submitBtn').disabled = true;

    setTimeout(() => {
      const result = App.login(email, password);
      if (result.ok) {
        App.toast('Login successful! Redirecting...', 'success');
        setTimeout(() => {
          window.location.href = result.user.role === 'admin' ? 'admin.html' : 'dashboard.html';
        }, 800);
      } else {
        const box = document.getElementById('alertBox');
        box.className = 'alert alert-danger mb-3';
        box.innerHTML = `<i class="bi bi-exclamation-triangle me-2"></i>${result.msg}`;
        box.classList.remove('d-none');
        document.getElementById('btnText').textContent = 'Sign In';
        document.getElementById('btnLoader').classList.add('d-none');
        document.getElementById('submitBtn').disabled = false;
      }
    }, 700);
  });
</script>
</body>
</html>
